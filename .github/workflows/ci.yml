name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check .

      - name: Compile check
        run: python -m compileall src tests

      - name: Run tests
        run: pytest -q

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Workspace secret scan
        run: |
          # Scan for potential secrets in tracked files
          FOUND=0
          # Real wxid (not placeholder xxx or synthetic test ids)
          if git grep -nE 'wxid_[a-zA-Z0-9]{10,}' -- ':!tests/' ':!*.md' ':!*skill_template*'; then
            echo "::error::Possible real wxid found in source"
            FOUND=1
          fi
          # 64-char hex keys (not in test files)
          if git grep -nE '[0-9a-fA-F]{64}' -- ':!tests/' ':!*.md'; then
            echo "::error::Possible hex key found in source"
            FOUND=1
          fi
          # Hardcoded absolute user paths (not templates)
          if git grep -nE 'C:\\Users\\[^<][^"]*\\(xwechat|WeChat)' -- ':!*.md' ':!tests/'; then
            echo "::error::Hardcoded user path found in source"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "No secrets detected"
